name: Build qrgen
on:
  push:
jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
      - name: Build executable
        run: pyinstaller --onefile --name qrgen main.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qrgen-${{ matrix.os }}
          path: dist/*